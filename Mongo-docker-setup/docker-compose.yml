#Page to set up the Docket components for MongoDb
version: '3.8'
services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: erica
      MONGO_INITDB_ROOT_PASSWORD: secret123
volumes:
  mongo-data: